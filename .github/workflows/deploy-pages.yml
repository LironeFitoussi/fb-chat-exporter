name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    env:
      HAS_PAGES_TOKEN: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: configure_pages
        if: ${{ env.HAS_PAGES_TOKEN != 'true' }}
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Configure Pages and enable site
        id: configure_pages_enablement
        if: ${{ env.HAS_PAGES_TOKEN == 'true' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_TOKEN }}
          enablement: true

      - name: Explain missing Pages enablement
        if: ${{ env.HAS_PAGES_TOKEN != 'true' && steps.configure_pages.outcome == 'failure' }}
        run: |
          Write-Error "GitHub Pages is not enabled for this repository yet. Either enable Pages once with: gh api --method POST repos/LironeFitoussi/fb-chat-exporter/pages -F build_type=workflow ; or add a repository secret named PAGES_TOKEN with a PAT that can enable Pages automatically."
          exit 1
        shell: pwsh

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
